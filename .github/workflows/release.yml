name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# The tag (minus its leading "v") becomes the package version, so the tag and the
# artifact version can never drift apart.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # The proprietary TrainCrewInput.dll is git-ignored and never in the checkout, but the compile
      # needs it. Pull the game developer's distribution zip and drop the DLL into ../dll, where the
      # csproj HintPath expects it. Bump the dated URL when a newer build is published.
      - name: Fetch TrainCrewInput.dll
        env:
          TRAINCREW_INPUT_DLL_URL: https://acty-soft.com/tatehama/TrainCrewInput20251116.zip
        run: |
          mkdir -p ../dll
          curl -fsSL "$TRAINCREW_INPUT_DLL_URL" -o traincrewinput.zip
          unzip -o traincrewinput.zip -d traincrewinput
          cp "$(find traincrewinput -name TrainCrewInput.dll | head -n1)" ../dll/TrainCrewInput.dll

      # This repo builds standalone, so the Rudolf schema package can't come from the sibling source
      # tree. Download the latest Rudolf release nupkg and expose it as a local NuGet feed so the
      # PackageReference (Version="*") resolves to it.
      - name: Fetch latest Rudolf package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p local-feed
          gh release download --repo haruyukitanuki/Rudolf --pattern "*.nupkg" --dir local-feed
          dotnet nuget add source "$(pwd)/local-feed" --name rudolf-local

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}

      - name: Create release and attach package
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.nupkg
